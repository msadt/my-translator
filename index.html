<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Translator 🐯</title>
    <style>
        /* SEVENTEEN 應援色風格 */
        :root {
            --rose-quartz: #F7CAC9;
            --serenity: #92A8D1;
            --hoshi-orange: #FF8C00;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, var(--rose-quartz) 0%, var(--serenity) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h2 { color: #555; margin-bottom: 20px; }
        
        textarea {
            width: 100%;
            height: 120px;
            border: 2px solid var(--rose-quartz);
            border-radius: 12px;
            padding: 12px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus { border-color: var(--serenity); }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-translate {
            background: var(--hoshi-orange);
            color: white;
        }

        .btn-copy {
            background: var(--serenity);
            color: white;
        }

        button:hover { opacity: 0.8; transform: translateY(-2px); }

        #result {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 12px;
            min-height: 60px;
            color: #333;
            line-height: 1.6;
            text-align: left;
            border: 1px dashed var(--serenity);
            white-space: pre-wrap;
        }

        .footer { font-size: 12px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🐯 Hoshi 雙向翻譯器</h2>
    
    <textarea id="inputText" placeholder="貼上韓文/英文 (翻成中文) 或 中文 (翻成韓文)..."></textarea>
    
    <div class="button-group">
        <button class="btn-translate" onclick="translateText()">瞬間變身!</button>
        <button class="btn-copy" onclick="copyResult()">複製結果</button>
    </div>

    <div id="result">翻譯結果會顯示在這裡...</div>
    
    <div class="footer">Powered by Gemini 2.0 Flash • Horanghae!</div>
</div>

<script>
    // 既然你不在意 API Key 公開，直接填在這裡最方便
    const apiKey = "AIzaSyCXQ2JQ-vrqTA7pWhXJYvUejYfLeRWDOZQ"; 

    async function translateText() {
        const text = document.getElementById('inputText').value.trim();
        const resultDiv = document.getElementById('result');
        
        if (!text) {
            alert("請先輸入文字喔！");
            return;
        }

        resultDiv.innerText = "🐯 翻譯中...";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ 
                            text: `你是一個專業翻譯官。請遵守以下規則：
                            1. 如果輸入是中文，請翻譯成「韓文」。
                            2. 如果輸入是韓文、英文或其他語言，請翻譯成「繁體中文」（使用台灣慣用語）。
                            3. 只輸出翻譯後的純文字，不要有任何解釋或多餘對話。
                            
                            待翻譯內容：
                            ${text}` 
                        }] 
                    }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const translated = data.candidates[0].content.parts[0].text;
                resultDiv.innerText = translated;
            } else {
                resultDiv.innerText = "翻譯失敗，請確認 API 是否正常。";
            }

        } catch (error) {
            console.error(error);
            resultDiv.innerText = "喔！網路好像斷掉了。";
        }
    }

    function copyResult() {
        const text = document.getElementById('result').innerText;
        if (text === "翻譯結果會顯示在這裡..." || text === "") return;
        
        navigator.clipboard.writeText(text).then(() => {
            alert("🐯 已成功複製到剪貼簿！");
        });
    }
</script>

</body>
</html>
