<script>
    async function translateText() {
    const apiKey = "你的_API_KEY_貼在這裡"; 
    const text = document.getElementById('inputText').value;
    const resultDiv = document.getElementById('result');
    
    if(!text) return;
    resultDiv.innerText = "🐯 虎視眈眈翻譯中...";

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: `你是一個精通多國語言的專業翻譯官。
                任務說明：
                1. 如果輸入是中文，請將其翻譯成「韓文」
                2. 如果輸入是韓文，請將其翻譯成「繁體中文」（使用台灣慣用語）。
                3. 只輸出翻譯結果，不要有任何解釋、前言或引號。
                
                輸入內容：
                ${text}` }] }]
            })
        });
        
        const data = await response.json();
        const translated = data.candidates[0].content.parts[0].text;
        resultDiv.innerText = translated;
    } catch (error) {
        resultDiv.innerText = "請檢查網路或 API Key。";
    }
}
</script>
