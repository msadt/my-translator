<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator</title>
    <style>
        /* Apple 極簡風格設定 */
        :root {
            --bg-color: #F5F5F7;
            --card-bg: #FFFFFF;
            --text-main: #1D1D1F;
            --text-secondary: #86868B;
            --accent: #0071E3; /* Apple 藍 */
            --border: #D2D2D7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            width: 90%;
            max-width: 480px;
            transition: all 0.3s ease;
        }

        h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 140px;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            box-sizing: border-box;
            font-size: 17px;
            line-height: 1.5;
            resize: none;
            outline: none;
            background-color: #FAFAFA;
            transition: border-color 0.2s ease;
        }

        textarea:focus {
            border-color: var(--accent);
            background-color: #FFFFFF;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-translate {
            background-color: var(--text-main);
            color: #FFFFFF;
        }

        .btn-translate:active {
            transform: scale(0.98);
            background-color: #333;
        }

        #result-container {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #F0F0F2;
            position: relative;
        }

        #result {
            font-size: 18px;
            color: var(--text-main);
            line-height: 1.6;
            min-height: 40px;
            cursor: pointer; /* 點擊內容即可複製 */
        }

        #result:hover {
            opacity: 0.7;
        }

        .hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>翻譯機</h2>
    
    <textarea id="inputText" placeholder="在此輸入或貼上文字..."></textarea>
    
    <div class="button-group">
        <button class="btn-translate" onclick="translateText()">翻譯</button>
    </div>

    <div id="result-container">
        <div id="result" onclick="copyResult()">翻譯結果會顯示在這裡...</div>
        <p class="hint">翻譯完後會自動複製結果並清除輸入框</p>
    </div>
</div>

<script>
    const apiKey = "AIzaSyBhLAqWjIi2LN3Y2bf_SjBeEImnFD1_k2k"; 

    async function translateText() {
        const inputElement = document.getElementById('inputText');
        const text = inputElement.value.trim();
        const resultDiv = document.getElementById('result');
        
        if (!text) return;

        resultDiv.innerText = "正在處理...";
        resultDiv.style.color = "#86868B";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ 
                            text: `你是一個專業翻譯官，且了解SEVENTEEN這個團體。請遵守以下規則：
                            1. 如果輸入是中文，請翻譯成「韓文」。
                            2. 如果輸入是韓文、英文或其他語言，請翻譯成「繁體中文」。
                            3. 只輸出翻譯後的純文字，不要有任何解釋。
                            
                            
                            內容：
                            ${text}` 
                        }] 
                    }]
                })
            });

            const data = await response.json();
            const translated = data.candidates[0].content.parts[0].text;
            
            // 1. 顯示結果
            resultDiv.innerText = translated;
            resultDiv.style.color = "#1D1D1F";
            
            // 2. 自動複製結果
            copyToClipboard(translated);
            
            // 3. 自動清除輸入框
            inputElement.value = "";

        } catch (error) {
            resultDiv.innerText = "翻譯發生錯誤";
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            console.log('已自動複製');
        });
    }

    function copyResult() {
        const text = document.getElementById('result').innerText;
        if (text && text !== "正在處理..." && text !== "翻譯結果會顯示在這裡...") {
            copyToClipboard(text);
            alert("已手動複製結果");
        }
    }
</script>

</body>
</html>
