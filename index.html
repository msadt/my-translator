<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator</title>
    <style>
        :root {
            --apple-bg: #F5F5F7;
            --apple-card: rgba(255, 255, 255, 0.85);
            --apple-text: #1D1D1F;
            --apple-blue: #007AFF;
            --apple-gray: #86868B;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--apple-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            width: 90%;
            max-width: 440px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h2 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: -0.022em;
        }

        textarea {
            width: 100%;
            height: 160px;
            border: none;
            border-radius: 18px;
            padding: 20px;
            box-sizing: border-box;
            font-size: 17px;
            line-height: 1.5;
            resize: none;
            background: rgba(0, 0, 0, 0.04);
            outline: none;
            transition: all 0.2s ease;
        }

        textarea:focus {
            background: rgba(0, 0, 0, 0.06);
            box-shadow: inset 0 0 0 2px var(--apple-blue);
        }

        .btn-translate {
            width: 100%;
            background-color: var(--apple-text);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 15px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s ease;
        }

        .btn-translate:hover {
            transform: scale(1.01);
            opacity: 0.9;
        }

        #result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 18px;
            background: white;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            white-space: pre-wrap;
        }

        .loading #result-text {
            animation: pulse 1.2s infinite ease-in-out;
            color: var(--apple-gray);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .toast {
            position: fixed;
            bottom: 40px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Translator</h2>
    <textarea id="inputText" placeholder="在此輸入文字..."></textarea>
    <button class="btn-translate" onclick="translateText()">Translate</button>
    
    <div id="result-box" onclick="manualCopy()">
        <span id="result-text" style="color: var(--apple-gray);">翻譯結果將顯示在此</span>
    </div>
</div>

<div id="toast" class="toast">已自動複製結果</div>

<script>
    // 確保這裡貼上你最新的 API Key
    const apiKey = "AIzaSyBhLAqWjIi2LN3Y2bf_SjBeEImnFD1_k2k"; 

    async function translateText() {
        const input = document.getElementById('inputText');
        const text = input.value.trim();
        const resultText = document.getElementById('result-text');
        const resultBox = document.getElementById('result-box');
        
        if (!text) return;

        resultBox.classList.add('loading');
        resultText.innerText = "Processing...";

        try {
            // 切換至 v1 正式版 API，並使用最相容的模型路徑
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ 
                            text: `你是一個專業翻譯官，且了解SEVENTEEN這個團體以及追星文化。請遵守以下規則：
1. 如果輸入是中文，請翻譯成「韓文」。
2. 如果輸入是韓文、英文或其他語言，請翻譯成「繁體中文」。
3. 只輸出翻譯後的純文字，不要有任何解釋。

內容：\n${text}` 
                        }] 
                    }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                // 如果 API 返回錯誤，直接顯示詳細訊息
                throw new Error(data.error.message);
            }

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const translated = data.candidates[0].content.parts[0].text.trim();
                resultText.innerText = translated;
                resultText.style.color = "var(--apple-text)";
                
                // 自動複製
                navigator.clipboard.writeText(translated);
                showToast();
                
                // 自動清空
                input.value = "";
            } else {
                throw new Error("無法取得翻譯結果");
            }

        } catch (error) {
            console.error(error);
            resultText.innerText = "Error: " + error.message;
            resultText.style.color = "#FF3B30";
        } finally {
            resultBox.classList.remove('loading');
        }
    }

    function showToast() {
        const toast = document.getElementById('toast');
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }

    function manualCopy() {
        const text = document.getElementById('result-text').innerText;
        if (text && text !== "翻譯結果將顯示在此" && !text.startsWith("Error") && text !== "Processing...") {
            navigator.clipboard.writeText(text);
            showToast();
        }
    }
</script>

</body>
</html>
